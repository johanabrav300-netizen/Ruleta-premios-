<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de Cupones</title>
</head>
<body>

<h1>Generador de Cupones</h1>

<button id="generar">
Generar 100 Cupones
</button>

<p id="resultado"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

 const firebaseConfig = {
  apiKey: "AIzaSyBVI02A9vOeuKqjCRVA-WiIAFeluazJALM",
  authDomain: "ruletapremios-acef9.firebaseapp.com",
  projectId: "ruletapremios-acef9",
  storageBucket: "ruletapremios-acef9.firebasestorage.app",
  messagingSenderId: "1023792024330",
  appId: "1:1023792024330:web:e6eb093cd009cc3ff388f3",
  measurementId: "G-43HGPV8SZ8"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function generarCodigo() {

  const caracteres =
  "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

  let codigo = "PREMIO-";

  for(let i=0;i<6;i++){

    codigo += caracteres.charAt(
      Math.floor(
        Math.random() *
        caracteres.length
      )
    );

  }

  return codigo;
}

document
.getElementById("generar")
.addEventListener("click", async ()=>{

  for(let i=0;i<100;i++){

    const codigo =
    generarCodigo();

    await setDoc(
      doc(db,"cupones",codigo),
      {
        usado:false,
        fechaCreacion:new Date().toISOString()
      }
    );

  }

  document
  .getElementById("resultado")
  .textContent =
  "100 cupones generados";

});

</script>

</body>
</html>
