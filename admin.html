    <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Cupones</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #1a233a; color: white; text-align: center; }
        button { background-color: #ff5722; color: white; border: none; padding: 15px 25px; font-size: 16px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        button:active { background-color: #e64a19; }
        textarea { width: 100%; max-width: 400px; height: 180px; margin-top: 20px; padding: 10px; border-radius: 5px; border: none; font-size: 14px; background-color: #2e3b5e; color: white; }
    </style>
</head>
<body>
    <h2>Generador Automático de Tokens</h2>
    <p>Presiona el botón para crear 50 tokens válidos de un solo uso en Firebase.</p>
    <button id="btnGenerar">Generar 50 Tokens</button>
    <br>
    <textarea id="resultado" readonly placeholder="Los códigos generados aparecerán aquí..."></textarea>

    <script type="module">
        import { db, doc, setDoc } from "./firebase-config.js";

        document.getElementById("btnGenerar").addEventListener("click", async () => {
            const caracteres = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            const textarea = document.getElementById("resultado");
            textarea.value = "Generando en Firebase... por favor espera\n";
            let codigosCreados = [];

            for (let i = 0; i < 50; i++) {
                let nuevoCodigo = "";
                for (let j = 0; j < 6; j++) {
                    nuevoCodigo += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
                }

                try {
                    // Guarda el token en tu colección "Tokens"
                    await setDoc(doc(db, "Tokens", nuevoCodigo), {
                        usado: false,
                        fechaCreacion: new Date()
                    });
                    codigosCreados.push(nuevoCodigo);
                    textarea.value += `Creado: ${nuevoCodigo}\n`;
                } catch (e) {
                    console.error("Error al crear:", e);
                }
            }
            textarea.value += "\n¡Listo! Copia tus nuevos códigos:\n\n" + codigosCreados.join(", ");
        });
    </script>
</body>
</html>
